[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Bundle the prebuilt RAG index + pattern catalog + ebook content with the functions.
  included_files = ["public/ai/embeddings.json", "components/data/patternCatalog.json", "ebooks/**"]

# Clean URLs for the AI endpoints: /api/<tool> -> /.netlify/functions/<tool>
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/posts/semantic-search-ai-in-dotnet9"
  to = "/posts/semantic-search-ai-in-dotnet"
  status = 301
  force = true

[[redirects]]
  from = "/patterns/fluent-builder-pattern-how-to-simplify-complex-object-creation"
  to = "/posts/builder-pattern-in-dotnet"
  status = 301
  force = true

[[redirects]]
  from = "/patterns/decorator-pattern-in-dotnet-explained"
  to = "/posts/decorator-pattern-in-dotnet"
  status = 301
  force = true

[[redirects]]
  from = "/posts/use-architecture-tests-in-your-projects"
  to = "/posts/architecture-tests-dotnet-clean-architecture"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
